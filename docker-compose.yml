services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: wiproj2ee
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spring-net

  app:
    build: .
    container_name: spring-app
    restart: always
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/wiproj2ee
      DB_USERNAME: root
      DB_PASSWORD: 1234
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wiproj2ee
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    depends_on:
      - mysql
    networks:
      - spring-net

volumes:
  mysql_data:

networks:
  spring-net: